config:
  backup: true
  banner: false
  create: true
  dotpath: dotfiles
  ignoreempty: false
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: false
  showdiff: false
  workdir: ~/.config/dotdrop
dotfiles:
  d_iterm:
    src: iTerm
    dst: ~/.config/iTerm
  f_brew-prune-packages:
    src: bin/brew-prune-packages
    dst: ~/.local/bin/brew-prune-packages
  f_mrg:
    src: bin/mrg
    dst: ~/.local/bin/mrg
  f_purge-time-machine-snapshots:
    src: bin/purge-time-machine-snapshots
    dst: ~/.local/bin/purge-time-machine-snapshots
  f_init.vim:
    src: init.vim
    dst: ~/.config/nvim/init.vim
  f_tmux.conf:
    src: tmux.conf
    dst: ~/.tmux.conf
  f_config.fish:
    src: fish/config.fish
    dst: ~/.config/fish/config.fish
  f_fish_greeting.fish:
    src: fish/functions/fish_greeting.fish
    dst: ~/.config/fish/functions/fish_greeting.fish
  f_fish_prompt.fish:
    src: fish/functions/fish_prompt.fish
    dst: ~/.config/fish/functions/fish_prompt.fish
  f_fish_title.fish:
    src: fish/functions/fish_title.fish
    dst: ~/.config/fish/functions/fish_title.fish
  f_newdir.fish:
    src: fish/functions/newdir.fish
    dst: ~/.config/fish/functions/newdir.fish
  f_fishfile:
    src: fish/fishfile
    dst: ~/.config/fish/fishfile
  f_hidehidden.fish:
    src: fish/functions/hideHidden.fish
    dst: ~/.config/fish/functions/hideHidden.fish
  f_showhidden.fish:
    src: fish/functions/showHidden.fish
    dst: ~/.config/fish/functions/showHidden.fish
  f_brewfile:
    src: brew/Brewfile
    dst: ~/.config/brew/Brewfile
profiles:
  fish:
    dotfiles:
    - f_fishfile
    - f_config.fish
    - f_fish_greeting.fish
    - f_fish_prompt.fish
    - f_fish_title.fish
    - f_newdir.fish
    - f_hidehidden.fish
    - f_showhidden.fish
  Paysons-Mac-Pro:
    include:
    - fish
    dotfiles:
    - d_iterm
    - f_brew-prune-packages
    - f_mrg
    - f_purge-time-machine-snapshots
    - f_init.vim
    - f_tmux.conf
    - f_brewfile
  Paysons-MacBook-Pro:
    include:
    - Paysons-Mac-Pro
