config:
  backup: true
  banner: false
  create: true
  dotpath: dotfiles
  ignoreempty: false
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: false
  showdiff: false
  workdir: ~/.config/dotdrop
dotfiles:
  d_autostart:
    src: config/autostart
    dst: ~/.config/autostart
  d_gtk-2.0:
    src: config/gtk-2.0
    dst: ~/.config/gtk-2.0
  d_gtk-3.0:
    src: config/gtk-3.0
    dst: ~/.config/gtk-3.0
  d_polybar:
    dst: ~/.config/polybar
    src: config/polybar
  d_rofi:
    dst: ~/.config/rofi
    src: config/rofi
  d_utilities:
    dst: ~/.config/utilities
    src: config/utilities
  f_bspwmrc:
    dst: ~/.config/bspwm/bspwmrc
    src: config/bspwm/bspwmrc
  f_compton.conf:
    dst: ~/.config/compton/compton.conf
    src: config/compton/compton.conf
  f_dunstrc:
    dst: ~/.config/dunst/dunstrc
    src: config/dunst/dunstrc
  f_init.vim:
    dst: ~/.config/nvim/init.vim
    src: config/nvim/init.vim
  f_profile:
    dst: ~/.profile
    src: profile
  f_sxhkdrc:
    dst: ~/.config/sxhkd/sxhkdrc
    src: config/sxhkd/sxhkdrc
  f_tmux.conf:
    dst: ~/.tmux.conf
    src: tmux.conf
  f_xbindkeysrc:
    dst: ~/.Xbindkeysrc
    src: Xbindkeysrc
  f_xmodmap:
    dst: ~/.Xmodmap
    src: Xmodmap
  f_xresources:
    dst: ~/.Xresources
    src: Xresources
  f_xscreensaver:
    dst: ~/.xscreensaver
    src: xscreensaver
  f_xsession:
    dst: ~/.xsession
    src: xsession
  f_config.fish:
    dst: ~/.config/fish/config.fish
    src: config/fish/config.fish
  f_fish_greeting.fish:
    src: config/fish/functions/fish_greeting.fish
    dst: ~/.config/fish/functions/fish_greeting.fish
  f_fish_prompt.fish:
    src: config/fish/functions/fish_prompt.fish
    dst: ~/.config/fish/functions/fish_prompt.fish
  f_fish_title.fish:
    src: config/fish/functions/fish_title.fish
    dst: ~/.config/fish/functions/fish_title.fish
  f_fuck.fish:
    src: config/fish/functions/fuck.fish
    dst: ~/.config/fish/functions/fuck.fish
  f_newdir.fish:
    src: config/fish/functions/newdir.fish
    dst: ~/.config/fish/functions/newdir.fish
  f_fishfile:
    src: config/fish/fishfile
    dst: ~/.config/fish/fishfile
  f_pacfile:
    src: pacfile
    dst: ~/.config/pacfile
profiles:
  fish:
    dotfiles:
    - f_config.fish
    - f_fish_greeting.fish
    - f_fish_prompt.fish
    - f_fish_title.fish
    - f_fuck.fish
    - f_newdir.fish
    - f_fishfile
  gnome:
    include:
    - fish
    - x
    dotfiles:
    - d_autostart
    - d_gtk-2.0
    - d_gtk-3.0
    - f_init.vim
    - f_tmux.conf
  x:
    dotfiles:
    - f_xmodmap
    - f_xresources
    - f_xscreensaver
  arch_bspwm:
    include:
    - fish
    - gnome
    - x
    dotfiles:
    - d_polybar
    - d_rofi
    - d_utilities
    - f_bspwmrc
    - f_compton.conf
    - f_dunstrc
    - f_profile
    - f_sxhkdrc
    - f_xbindkeysrc
    - f_xsession
  Paysons-MacBook-Pro:
    include:
    - fish
    dotfiles:
    - f_pacfile
