config:
  backup:               true
  banner:               false
  create:               true
  dotpath:              dotfiles
  ignoreempty:          false
  keepdot:              false
  link_dotfile_default: nolink
  link_on_import:       nolink
  longkey:              false
  showdiff:             false
  workdir:              ~/.config/dotdrop
dotfiles:
  d_autostart:
    src:                config/autostart
    dst:                ~/.config/autostart
  d_gtk-2.0:
    src:                config/gtk-2.0
    dst:                ~/.config/gtk-2.0
  d_gtk-3.0:
    src:                config/gtk-3.0
    dst:                ~/.config/gtk-3.0
  d_polybar:
    dst:                ~/.config/polybar
    src:                config/polybar
  d_rofi:
    dst:                ~/.config/rofi
    src:                config/rofi
  d_utilities:
    dst:                ~/.config/utilities
    src:                config/utilities
  f_bspwmrc:
    dst:                ~/.config/bspwm/bspwmrc
    src:                config/bspwm/bspwmrc
  f_compton.conf:
    dst:                ~/.config/compton/compton.conf
    src:                config/compton/compton.conf
  f_dunstrc:
    dst:                ~/.config/dunst/dunstrc
    src:                config/dunst/dunstrc
  f_init.vim:
    dst:                ~/.config/nvim/init.vim
    src:                config/nvim/init.vim
  f_profile:
    dst:                ~/.profile
    src:                profile
  f_sxhkdrc:
    dst:                ~/.config/sxhkd/sxhkdrc
    src:                config/sxhkd/sxhkdrc
  f_tmux.conf:
    dst:                ~/.tmux.conf
    src:                tmux.conf
  f_xbindkeysrc:
    dst:                ~/.Xbindkeysrc
    src:                Xbindkeysrc
  f_xmodmap:
    dst:                ~/.Xmodmap
    src:                Xmodmap
  f_xresources:
    dst:                ~/.Xresources
    src:                Xresources
  f_xscreensaver:
    dst:                ~/.xscreensaver
    src:                xscreensaver
  f_xsession:
    dst:                ~/.xsession
    src:                xsession
  f_config.fish:
    dst:                ~/.config/fish/config.fish
    src:                config/fish/config.fish
  f_dotdrop.fish:
    src: config/fish/functions/dotdrop.fish
    dst: ~/.config/fish/functions/dotdrop.fish
  f_fuck.fish:
    src:                config/fish/functions/fuck.fish
    dst:                ~/.config/fish/functions/fuck.fish
  f_newdir.fish:
    src:                config/fish/functions/newdir.fish
    dst:                ~/.config/fish/functions/newdir.fish
  f_fishfile:
    src: config/fish/fishfile
    dst: ~/.config/fish/fishfile
  f_mrg:
    src: bin/mrg
    dst: ~/.local/bin/mrg
  f_repair-permissions:
    src: bin/repair-permissions
    dst: ~/.local/bin/repair-permissions
  f_ipython_config.py:
    src: ipython/profile_default/ipython_config.py
    dst: ~/.ipython/profile_default/ipython_config.py
  f_init.vim:
    src: init.vim
    dst: ~/.config/nvim/init.vim
  f_tmux.conf:
    src: tmux.conf
    dst: ~/.tmux.conf
  f_fishfile:
    src: fish/fishfile
    dst: ~/.config/fish/fishfile
  f_config.fish:
    src: fish/config.fish
    dst: ~/.config/fish/config.fish
  f_dotdrop.fish:
    src: fish/functions/dotdrop.fish
    dst: ~/.config/fish/functions/dotdrop.fish
  f_fext.fish:
    src: fish/functions/fext.fish
    dst: ~/.config/fish/functions/fext.fish
  f_fuck.fish:
    src: fish/functions/fuck.fish
    dst: ~/.config/fish/functions/fuck.fish
  f_newdir.fish:
    src: fish/functions/newdir.fish
    dst: ~/.config/fish/functions/newdir.fish
  f_hidehidden.fish:
    src: fish/functions/hideHidden.fish
    dst: ~/.config/fish/functions/hideHidden.fish
  f_showhidden.fish:
    src: fish/functions/showHidden.fish
    dst: ~/.config/fish/functions/showHidden.fish
profiles:
  fish:
    dotfiles:
      - f_fishfile
      - f_config.fish
      - f_dotdrop.fish
      - f_fuck.fish
      - f_newdir.fish
      - f_hidehidden.fish
      - f_showhidden.fish
      - f_fext.fish
  Paysons-Mac-Pro:
    include:
    - fish
    dotfiles:
    - f_mrg
    - f_repair-permissions
    - f_ipython_config.py
    - f_pacfile
